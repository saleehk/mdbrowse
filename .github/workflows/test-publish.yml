name: Test npm publish

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  debug:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Debug OIDC token
        run: |
          echo "=== OIDC Token Claims ==="
          curl -sS -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=https://registry.npmjs.org" | \
            jq -r '.value' | cut -d. -f2 | base64 -d 2>/dev/null | jq . || echo "Failed to decode OIDC token"
          echo "=== End OIDC Claims ==="

      - name: Dry run publish
        run: npm publish --provenance --access public --dry-run
